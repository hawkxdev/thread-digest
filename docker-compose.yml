services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: thread-digest-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TZ: Europe/Moscow
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./prompts:/app/prompts:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
